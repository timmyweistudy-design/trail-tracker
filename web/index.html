<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#16301f">
  <title>步道誌 Trail Tracker</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700;900&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap">
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css">
  <link rel="stylesheet" href="vendor/markercluster/markercluster.css">
  <link rel="stylesheet" href="vendor/markercluster/markercluster-default.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="app-header-inner">
      <div class="brand">
        <span class="brand-mark">⛰</span>
        <div class="brand-text">
          <h1>步道誌</h1>
          <span class="brand-en">TRAIL&nbsp;TRACKER</span>
        </div>
      </div>
      <p class="sub">尋徑・分級・記錄你的每一步</p>
    </div>
  </header>

  <!-- 探索 -->
  <section id="view-explore" class="view active">
    <div class="search"><input id="searchInput" type="search" placeholder="搜尋步道名稱、地區…" autocomplete="off"></div>
    <div class="chips" id="filterChips">
      <button class="chip active" data-filter="all">全部</button>
      <button class="chip" data-filter="fav">⭐ 收藏</button>
      <button class="chip" data-filter="family">👨‍👩‍👧 親子友善</button>
      <button class="chip" data-filter="d1">輕鬆</button>
      <button class="chip" data-filter="d2">一般</button>
      <button class="chip" data-filter="d3">進階</button>
      <button class="chip" data-filter="d45">挑戰以上</button>
    </div>
    <div class="chips" id="regionChips"></div>
    <div class="count-row">
      <span class="count" id="resultCount"></span>
      <span>
        <button class="info-link" id="btnMapView">🗺️ 地圖</button>
        <button class="info-link" id="btnNearMe">📍 附近</button>
        <button class="info-link" id="btnGradeInfo">ⓘ 分級</button>
      </span>
    </div>
    <div class="adv-row">
      <select id="sortSel" class="adv-sel" aria-label="排序">
        <option value="default">排序：預設</option>
        <option value="length-asc">最短</option>
        <option value="length-desc">最長</option>
        <option value="diff-asc">最易</option>
        <option value="diff-desc">最難</option>
        <option value="name">名稱</option>
      </select>
      <button class="adv-tgl" id="tglOpen">排除封閉</button>
      <button class="adv-tgl" id="tglGeo">有路線</button>
    </div>
    <div id="browseMap" style="display:none"></div>
    <div id="trailList"></div>
  </section>

  <!-- 記錄 -->
  <section id="view-record" class="view">
    <div class="rec-stats">
      <div class="stat hero"><div class="num" id="stDist">0.00</div><div class="unit">公里</div></div>
      <div class="stat"><div class="num" id="stSteps">0</div><div class="unit">步數</div></div>
      <div class="stat"><div class="num" id="stKcal">0</div><div class="unit">大卡</div></div>
      <div class="stat"><div class="num" id="stTime">00:00</div><div class="unit">時間</div></div>
      <div class="stat"><div class="num" id="stPace">--</div><div class="unit">配速 分/公里</div></div>
      <div class="stat"><div class="num" id="stElev" style="font-size:22px">↑0 ↓0</div><div class="unit">爬升/下降 (公尺)</div></div>
    </div>
    <div class="rec-status" id="recStatus">準備就緒，按「開始」記錄路徑</div>
    <div id="recMap"></div>
    <div class="rec-controls" style="margin-top:14px">
      <button class="btn primary" id="btnStart">▶ 開始</button>
      <button class="btn amber" id="btnPause" style="display:none">⏸ 暫停</button>
      <button class="btn danger" id="btnStop" style="display:none">⏹ 結束</button>
    </div>
    <label class="sim-toggle"><input type="checkbox" id="simToggle"> 模擬模式（電腦無 GPS 時可預覽）</label>
    <button class="btn ghost" id="btnImportGpx" style="margin-top:10px">📥 匯入 GPX 路線（跟著走）</button>
    <input type="file" id="gpxFile" accept=".gpx,application/gpx+xml" style="display:none">
  </section>

  <!-- 我的 -->
  <section id="view-me" class="view">
    <div class="section-title">個人資料（用於估算步數與卡路里）</div>
    <div class="field"><label>體重（公斤）</label><input id="pfWeight" type="number" inputmode="decimal" min="20" max="200" placeholder="60"></div>
    <div class="field"><label>身高（公分）</label><input id="pfHeight" type="number" inputmode="numeric" min="100" max="220" placeholder="170"></div>
    <button class="btn primary" id="btnSaveProfile">儲存</button>

    <div class="section-title">離線地圖</div>
    <div class="offline-manage">
      <div id="offlineStatus" class="offline-status">已快取地圖圖磚：計算中…</div>
      <div class="offline-hint">在步道詳情頁按「⬇️ 預載離線地圖」可下載該步道範圍，山區無網路也能看地圖。</div>
      <button class="btn-clear-all" id="btnClearTiles" style="margin-top:8px">清除離線地圖</button>
    </div>

    <div class="hist-head">
      <span class="section-title" style="margin:0">行程紀錄</span>
      <button class="btn-clear-all" id="btnClearAll" style="display:none">清除全部</button>
    </div>
    <div id="historyList"></div>
  </section>

  <!-- 詳情面板 -->
  <div class="sheet-mask" id="sheetMask"></div>
  <div class="sheet" id="detailSheet">
    <div class="grip"></div>
    <button class="sheet-close" id="closeDetailBtn" aria-label="關閉">✕</button>
    <div id="detailMap"></div>
    <div class="sheet-body" id="detailBody"></div>
  </div>

  <!-- 行程軌跡回顧 -->
  <div class="sheet-mask" id="trackMask"></div>
  <div class="sheet" id="trackSheet">
    <div class="grip"></div>
    <button class="sheet-close" id="closeTrackBtn" aria-label="關閉">✕</button>
    <div id="trackMap"></div>
    <div class="sheet-body" id="trackBody"></div>
  </div>

  <!-- 分級說明面板（最上層） -->
  <div class="sheet-mask grade-mask" id="gradeMask"></div>
  <div class="sheet grade-sheet" id="gradeSheet">
    <div class="grip"></div>
    <button class="sheet-close" id="closeGradeBtn" aria-label="關閉">✕</button>
    <div class="sheet-body" id="gradeBody"></div>
  </div>

  <nav class="tabbar">
    <button class="tab active" data-view="explore"><span class="ico">🧭</span>探索</button>
    <button class="tab" data-view="record"><span class="ico">📍</span>記錄</button>
    <button class="tab" data-view="me"><span class="ico">👤</span>我的</button>
  </nav>

  <div class="toast" id="toast"></div>
</div>

<script src="vendor/leaflet/leaflet.js"></script>
<script src="vendor/markercluster/markercluster.js"></script>
<script src="js/trails-data.js"></script>
<script src="js/trails-geo.js" defer></script>
<script src="js/storage.js"></script>
<script src="js/grades.js"></script>
<script src="js/config.js"></script>
<script src="js/photos.js"></script>
<script src="js/food.js"></script>
<script src="js/weather.js"></script>
<script src="js/profile.js"></script>
<script src="js/offline.js"></script>
<script src="js/gpx.js"></script>
<script src="js/recorder.js"></script>
<script src="js/app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
  }
</script>
</body>
</html>
